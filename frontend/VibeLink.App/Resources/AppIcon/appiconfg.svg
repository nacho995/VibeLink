<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para la V (Primary - Rojo Netflix) -->
    <linearGradient id="vGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    
    <!-- Gradiente para la I (Secondary - Cyan PlayStation) -->
    <linearGradient id="iGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    
    <!-- Gradiente para la B (Accent - Verde Xbox) -->
    <linearGradient id="bGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7bed9f"/>
      <stop offset="100%" style="stop-color:#2ed573"/>
    </linearGradient>
    
    <!-- Gradiente para la E (AccentAlt - Morado) -->
    <linearGradient id="eGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    
    <!-- Sombra -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Letras VIBE centradas y más grandes -->
  <g filter="url(#shadow)" transform="translate(0, -20)">
    
    <!-- Letra V -->
    <path d="M 55 150 L 110 310 L 165 150 L 128 150 L 110 230 L 92 150 Z" 
          fill="url(#vGradient)"/>
    
    <!-- Letra I con punto -->
    <rect x="180" y="150" width="36" height="160" rx="6" fill="url(#iGradient)"/>
    <circle cx="198" cy="118" r="22" fill="url(#iGradient)"/>
    
    <!-- Letra B -->
    <path d="M 235 150 L 235 310 L 300 310 
             C 338 310 350 285 350 265 
             C 350 245 332 230 318 226
             C 332 222 345 205 345 185 
             C 345 155 320 150 290 150 Z
             M 272 180 L 295 180 
             C 315 180 318 195 318 205 
             C 318 215 310 225 290 225 L 272 225 Z
             M 272 250 L 300 250 
             C 322 250 322 268 322 278 
             C 322 288 315 285 300 285 L 272 285 Z" 
          fill="url(#bGradient)"/>
    
    <!-- Letra E -->
    <path d="M 370 150 L 370 310 L 440 310 L 440 280 L 406 280 
             L 406 242 L 435 242 L 435 212 L 406 212 
             L 406 180 L 440 180 L 440 150 Z" 
          fill="url(#eGradient)"/>
    
  </g>
  
  <!-- LINK debajo -->
  <text x="228" y="365" 
        font-family="Arial Black, Arial, sans-serif" 
        font-size="42" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="6">LINK</text>
  
  <!-- Línea decorativa -->
  <rect x="130" y="385" width="196" height="4" rx="2" fill="url(#vGradient)"/>
  
</svg>
