<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente de fondo oscuro -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    
    <!-- Gradiente para la V (Primary - Rojo Netflix) -->
    <linearGradient id="vGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    
    <!-- Gradiente para la I (Secondary - Cyan PlayStation) -->
    <linearGradient id="iGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    
    <!-- Gradiente para la B (Accent - Verde Xbox) -->
    <linearGradient id="bGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7bed9f"/>
      <stop offset="100%" style="stop-color:#2ed573"/>
    </linearGradient>
    
    <!-- Gradiente para la E (AccentAlt - Morado) -->
    <linearGradient id="eGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    
    <!-- Glow effects -->
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Sombra suave -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Fondo con gradiente -->
  <rect x="0" y="0" width="456" height="456" rx="90" fill="url(#bgGradient)"/>
  
  <!-- Círculos decorativos de fondo (efecto gaming) -->
  <circle cx="380" cy="80" r="120" fill="#e94560" opacity="0.08"/>
  <circle cx="80" cy="380" r="100" fill="#00d4ff" opacity="0.06"/>
  <circle cx="228" cy="228" r="180" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  
  <!-- Contenedor de letras VIBE -->
  <g filter="url(#shadow)">
    
    <!-- Letra V -->
    <g filter="url(#glowRed)">
      <path d="M 70 140 L 115 280 L 160 140 L 130 140 L 115 200 L 100 140 Z" 
            fill="url(#vGradient)"/>
    </g>
    
    <!-- Letra I -->
    <g filter="url(#glowCyan)">
      <rect x="175" y="140" width="30" height="140" rx="5" fill="url(#iGradient)"/>
      <!-- Punto decorativo de la I -->
      <circle cx="190" cy="115" r="18" fill="url(#iGradient)"/>
    </g>
    
    <!-- Letra B -->
    <g>
      <path d="M 225 140 L 225 280 L 280 280 
               C 310 280 320 260 320 245 
               C 320 230 305 218 295 215
               C 305 212 315 200 315 185 
               C 315 160 295 140 270 140 Z
               M 255 165 L 270 165 
               C 285 165 290 175 290 185 
               C 290 195 285 205 270 205 L 255 205 Z
               M 255 225 L 275 225 
               C 295 225 295 240 295 248 
               C 295 256 290 260 275 260 L 255 260 Z" 
            fill="url(#bGradient)"/>
    </g>
    
    <!-- Letra E -->
    <g>
      <path d="M 340 140 L 340 280 L 400 280 L 400 255 L 370 255 
               L 370 220 L 395 220 L 395 195 L 370 195 
               L 370 165 L 400 165 L 400 140 Z" 
            fill="url(#eGradient)"/>
    </g>
    
  </g>
  
  <!-- Línea "LINK" debajo -->
  <text x="228" y="330" 
        font-family="Arial, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="8">LINK</text>
  
  <!-- Línea decorativa inferior -->
  <rect x="140" y="350" width="176" height="3" rx="2" fill="#e94560" opacity="0.8"/>
  
  <!-- Iconos pequeños representando películas/juegos/series -->
  <!-- Película (claqueta simplificada) -->
  <g transform="translate(95, 365)">
    <rect x="0" y="0" width="24" height="18" rx="2" fill="#e94560" opacity="0.9"/>
    <rect x="2" y="2" width="20" height="5" fill="#1a1a2e"/>
  </g>
  
  <!-- Serie (TV simplificada) -->
  <g transform="translate(216, 365)">
    <rect x="0" y="2" width="24" height="16" rx="2" fill="#00d4ff" opacity="0.9"/>
    <rect x="8" y="18" width="8" height="3" fill="#00d4ff" opacity="0.9"/>
  </g>
  
  <!-- Juego (control simplificado) -->
  <g transform="translate(337, 365)">
    <ellipse cx="12" cy="9" rx="14" ry="8" fill="#7bed9f" opacity="0.9"/>
    <circle cx="6" cy="9" r="3" fill="#1a1a2e"/>
    <circle cx="18" cy="9" r="3" fill="#1a1a2e"/>
  </g>
  
</svg>
