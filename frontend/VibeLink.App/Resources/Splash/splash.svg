<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para la V -->
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    
    <!-- Gradiente para la I -->
    <linearGradient id="iGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    
    <!-- Gradiente para la B -->
    <linearGradient id="bGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7bed9f"/>
      <stop offset="100%" style="stop-color:#2ed573"/>
    </linearGradient>
    
    <!-- Gradiente para la E -->
    <linearGradient id="eGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    
    <!-- Sombra suave -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- VIBE en grande, centrado -->
  <g filter="url(#glow)" transform="translate(0, -30)">
    
    <!-- V -->
    <path d="M 60 180 L 120 340 L 180 180 L 145 180 L 120 270 L 95 180 Z" 
          fill="url(#vGrad)"/>
    
    <!-- I con punto -->
    <rect x="195" y="180" width="35" height="160" rx="5" fill="url(#iGrad)"/>
    <circle cx="212" cy="148" r="22" fill="url(#iGrad)"/>
    
    <!-- B -->
    <path d="M 250 180 L 250 340 L 315 340 
             C 355 340 368 312 368 290 
             C 368 268 348 252 332 248
             C 348 244 362 225 362 202 
             C 362 175 335 180 305 180 Z
             M 288 210 L 310 210 
             C 332 210 335 225 335 235 
             C 335 245 328 255 308 255 L 288 255 Z
             M 288 280 L 315 280 
             C 340 280 340 298 340 308 
             C 340 318 332 315 315 315 L 288 315 Z" 
          fill="url(#bGrad)"/>
    
    <!-- E -->
    <path d="M 385 180 L 385 340 L 455 340 L 455 310 L 420 310 
             L 420 272 L 450 272 L 450 242 L 420 242 
             L 420 210 L 455 210 L 455 180 Z" 
          fill="url(#eGrad)"/>
  </g>
  
  <!-- LINK -->
  <text x="256" y="390" 
        font-family="Arial Black, Arial, sans-serif" 
        font-size="48" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="8">LINK</text>
  
  <!-- Tagline -->
  <text x="256" y="430" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        fill="#8899aa" 
        text-anchor="middle"
        letter-spacing="2">MOVIES · SERIES · GAMES</text>
  
  <!-- Línea decorativa -->
  <rect x="180" y="448" width="152" height="3" rx="2" fill="url(#vGrad)" opacity="0.7"/>
  
</svg>
